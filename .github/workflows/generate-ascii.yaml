name: Generate ASCII Artwork

on: 
  push

jobs:
  ascii_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6
    - name: List Repo Files
      run: ls -ltra  
    - name: Execute Shell Script
      run: |
        chmod +x asciiscript2.sh
        ./asciiscript2.sh

    